services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digital-service-note-app
    working_dir: /var/www/html
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    environment:
      APP_NAME: Digital Service Note System
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mariadb
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: digital_service_note
      DB_USERNAME: service_note
      DB_PASSWORD: service_note_password
    depends_on:
      - database

  database:
    image: mariadb:11.4
    container_name: digital-service-note-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_DATABASE: digital_service_note
      MARIADB_USER: service_note
      MARIADB_PASSWORD: service_note_password
      MARIADB_ROOT_PASSWORD: root_password
    volumes:
      - database_data:/var/lib/mysql

volumes:
  database_data:
  vendor:
